<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">

</head>

<body class="login">
<div class="container-fundo">
    <form action="jotainsta.html" class="caixa-login">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Instituto_Federal_do_Amazonas_-_Marca_Vertical_2015.svg/960px-Instituto_Federal_do_Amazonas_-_Marca_Vertical_2015.svg.png" alt="Ícone de cadeado" class="icone-cadeado">
        <label for="usuario">Nome de usuário</label>
        <input type="text" id="usuario" placeholder="Digite seu nome de usuário" required>
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
